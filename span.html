<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      .box {
        width: 700px;
        height: 300px;
        border: 1px solid #000;
        margin: auto;
        background-color: black;
        padding: 10px;
      }
      .box p {
        color: white;
        text-align: center;
        font-size: 1.9em;
        padding-top: 50px;
        font-weight: bolder;
        font-family: "Ubuntu", sans-serif;
      }
      #life {
        color: yellow;
      }
      #support {
        color: orange;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p>
        “<span id="life">Life</span> is like a dosa — sometimes crispy,
        sometimes soft, but always better with a little chutney of humor and a
        lot of sambhar <span id="support">support!</span>” 😄
      </p>
    </div>
  </body>
</html>
